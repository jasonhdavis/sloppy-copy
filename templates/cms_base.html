<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CMS | Sloppy Copy{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Tailwind -->
    <link rel="stylesheet" href="https://unpkg.com/@material-tailwind/html@latest/styles/material-tailwind.css" />
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- EasyMDE -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-blue-gray-900">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-blue-gray-100 flex flex-col">
            <div class="p-6 border-b border-blue-gray-100">
                <h1 class="text-xl font-bold tracking-tight text-blue-600">
                    <a href="{% url 'core:cms_dashboard' %}">Sloppy CMS</a>
                </h1>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="{% url 'core:cms_dashboard' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-medium rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                    Dashboard
                </a>
                <a href="{% url 'core:cms_digest' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-medium rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                    Source Digest
                </a>
                <a href="{% url 'core:cms_authors' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-medium rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                    Authors
                </a>
                <a href="{% url 'admin:sources_source_changelist' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-medium rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                    Sources (Admin)
                </a>
                <a href="{% url 'admin:orchestrator_pipelinerun_changelist' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-medium rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                    Pipeline Logs (Admin)
                </a>
                <div class="pt-4 mt-4 border-t border-blue-gray-100">
                    <a href="{% url 'core:dashboard' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-medium rounded-lg hover:bg-gray-100 transition-colors">
                        View Public Site
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            <header class="h-16 bg-white border-b border-blue-gray-100 flex items-center justify-between px-8">
                <h2 class="text-lg font-semibold">{% block header_title %}Dashboard{% endblock %}</h2>
                <div class="flex items-center gap-4">
                    <!-- Quick Actions -->
                    <button hx-post="{% url 'sources:ingest_feeds' %}" hx-swap="none" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-wide hover:bg-blue-700 transition-colors">
                        Fetch Feeds
                    </button>
                </div>
            </header>
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Material Tailwind Scripts -->
    <script src="https://unpkg.com/@material-tailwind/html@latest/scripts/ripple.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const editors = document.querySelectorAll('.markdown-editor');
            editors.forEach(el => {
                new EasyMDE({ element: el });
            });
        });

        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
</body>
</html>
