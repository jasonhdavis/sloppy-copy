<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sloppy Copy{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Tailwind -->
    <link rel="stylesheet" href="https://unpkg.com/@material-tailwind/html@latest/styles/material-tailwind.css" />
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- EasyMDE -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Google Fonts: Playfair Display & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .font-sans {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-white text-black">
    <header class="border-t-4 border-b border-black py-4 mb-8">
        <div class="container mx-auto px-4 text-center">
            <h1 class="font-serif text-5xl font-bold tracking-tighter uppercase">
                <a href="/">Sloppy Copy</a>
            </h1>
            <nav class="mt-4">
                <ul class="flex justify-center gap-6 font-sans text-xs font-bold uppercase tracking-widest">
                    <li><a href="/" class="hover:text-gray-600">Home</a></li>
                    <li><a href="{% url 'authors:list' %}" class="hover:text-gray-600">Authors</a></li>
                    <li><a href="{% url 'core:cms_dashboard' %}" class="hover:text-gray-600">CMS</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-300 py-8 mt-12">
        <div class="container mx-auto px-4 text-center font-sans text-xs text-gray-500 uppercase tracking-widest">
            &copy; 2026 Sloppy Copy Editorial Pipeline
        </div>
    </footer>

    <!-- Material Tailwind Scripts -->
    <script src="https://unpkg.com/@material-tailwind/html@latest/scripts/ripple.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize EasyMDE on all textareas with class 'markdown-editor'
            const editors = document.querySelectorAll('.markdown-editor');
            editors.forEach(el => {
                new EasyMDE({ element: el });
            });
        });

        // HTMX CSRF setup
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
</body>
</html>
